# Active provider when SLM_PROVIDER is unset (must match a key under providers)
active_provider: deepseek

# Interactive REPL cycle budgets (FI-1 single source of truth)
interactive:
  finalizer: on
  budgets:
    answer: 1
    inspect: 4
    edit: 6
    run: 4
    build: 15

# OpenAI-compatible endpoints — add any provider here; no code changes required
providers:
  openrouter:
    base_url: https://openrouter.ai/api/v1
    base_url_env: OPENROUTER_BASE_URL
    api_key_env: OPENROUTER_API_KEY
    headers:
      HTTP-Referer: thesis-framework
      X-Title: SLM-Thesis

  deepseek:
    base_url: https://api.deepseek.com
    base_url_env: DEEPSEEK_BASE_URL
    api_key_env: DEEPSEEK_API_KEY

  ollama:
    base_url: http://localhost:11434/v1
    base_url_env: OLLAMA_BASE_URL
    api_key_env: OLLAMA_API_KEY
    api_key_required: false

  mohaymen:
    base_url: https://ai-gateway.mohaymen.ir/v1
    base_url_env: MOHAYMEN_BASE_URL
    api_key_env: MOHAYMEN_API_KEY

# Role → profile key (override with PLANNER_PROFILE / EXECUTOR_PROFILE in .env)
defaults:
  planner: deepseek-v4-flash
  executor: deepseek-v4-flash

# Named bundles — set PLANNER_PROFILE=slm_small and EXECUTOR_PROFILE=slm_small (or use --bundle)
bundles:
  slm_small:
    planner: qwen2.5-coder-7b-instruct
    executor: devstral-small
    provider: openrouter

  aviona_daily:
    planner: aviona-daily
    executor: aviona-daily
    provider: deepseek

profiles:
  default:
    model_id: deepseek-v4-flash
    provider: deepseek
    context_limit: 128000
    effective_context: 64000
    thinking_budget: 2048
    api_thinking: true
    reasoning_effort: high
    max_working_memory_tokens: 750
    tool_output_caps:
      pytest_run: 5000
      py_compile: 2000
      read_file: 12000
      search_codebase: 2000
    skill_budget_tokens: 150
    timeout_by_role:
      planner: 90
      executor: 120
      tool_call: 45
    tool_call_format: json

  aviona-daily:
    model_id: deepseek-v4-flash
    provider: deepseek
    context_limit: 128000
    effective_context: 64000
    thinking_budget: 2048
