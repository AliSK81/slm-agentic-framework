name: executor_code_edit
trigger_keywords:
  - edit_file
  - old_string
  - patch
content: |
  For new files, use tool_call with tool write_file (file_path, content).
  For existing files, use code_edit / edit_file; old_string must match exactly.
  Prefer minimal diffs. After editing, run py_compile or pytest before reporting success.
  Never invent file paths outside WORKSPACE_ROOT. One logical change per edit decision.
