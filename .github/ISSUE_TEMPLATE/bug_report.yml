name: Bug Report
description: Report a bug or unexpected behaviour
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in the fields below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behaviour.
      placeholder: |
        1. Configure SLM_PROVIDER=...
        2. Run `aviona`
        3. Enter prompt `...`
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, SLM provider, model profile
      placeholder: |
        - Python: 3.11
        - OS: Ubuntu 24.04
        - SLM_PROVIDER: ollama
        - PLANNER_PROFILE: ollama-qwen2.5-coder-3b
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs / Traceback
      description: Paste any relevant error output here.
      render: shell
